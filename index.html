<!DOCTYPE html>
<html>
<head>
<title>M-Tower</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2027;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.brand{
font-size:46px;
font-weight:700;
margin-bottom:25px;
}

.message{
font-size:20px;
line-height:1.7;
margin-bottom:40px;
}

.countdown{
font-size:38px;
font-weight:bold;
}

</style>
</head>

<body>

<div>

<div class="brand">M-Tower</div>

<div class="message">
💦 Even skyscrapers enjoy Thingyan!<br><br>
Our digital tower is taking a festive splash break
while Myanmar celebrates the New Year.<br><br>
We're refreshing our systems to serve you
better when the celebrations settle.
</div>

<div id="countdown" class="countdown"></div>

</div>

<script>
// Target: 2026-04-16 18:00:00 Myanmar Time (UTC+6:30)
// This equals 2026-04-16 11:30:00 UTC
var countDownDate = Date.UTC(2026, 3, 16, 11, 30, 0); // months are 0‑based: 3 = April

var x = setInterval(function() {
  var now = new Date().getTime(); // current time in milliseconds since epoch (UTC)
  var distance = countDownDate - now;

  // Time calculations
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  // Display result
  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

  // If countdown is finished
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "We're Back!";
  }
}, 1000);
</script>

</body>
</html>
